name: CI
on:
  push:
  pull_request:
permissions:
  contents: read
jobs:
  verify:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - name: Configure PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, curl, pdo_sqlite, gd
      - run: npm ci
      - run: npm run build
      - run: npm run lint
      - run: npm run audit:secrets
      - run: npm audit --audit-level=high
      - run: npm test
      - run: npx playwright install chromium
      - run: npm run test:e2e
